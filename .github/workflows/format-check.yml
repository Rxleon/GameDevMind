name: Format Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-format:
    name: Check Markdown Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install check dependencies
        run: pip install -r tools/check/requirements.txt

      - name: Run document quality check
        run: python tools/check/check_docs.py

      - name: Audit image references
        run: python tools/check/check_images.py
        continue-on-error: true

      - name: Summary
        run: |
          echo "## 格式与文档检查完成" >> $GITHUB_STEP_SUMMARY
          echo "已运行 check_docs.py 与 check_images.py" >> $GITHUB_STEP_SUMMARY
